<aside class="sidebar" [class.collapsed]="collapsed">
  <div class="sidebar-header">
    <button class="menu-toggle" type="button" (click)="toggleSidebar()" aria-label="Colapsar menú" title="Minimizar menú">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
        <path fill-rule="evenodd" d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5"/>
      </svg>
    </button>
    <span class="sidebar-brand">Revista Huellas</span>
  </div>

  <nav class="sidebar-nav">
    <a class="nav-item" *ngFor="let item of (visibleMainItems$ | async) ?? []" [routerLink]="item.route" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: false }">
      <span class="icon">

        <svg *ngIf="item.icon === 'list-check'" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
          fill="currentColor" class="bi bi-list-check" viewBox="0 0 16 16">
          <path fill-rule="evenodd"
            d="M5 11.5a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1-.5-.5M3.854 2.146a.5.5 0 0 1 0 .708l-1.5 1.5a.5.5 0 0 1-.708 0l-.5-.5a.5.5 0 1 1 .708-.708L2 3.293l1.146-1.147a.5.5 0 0 1 .708 0m0 4a.5.5 0 0 1 0 .708l-1.5 1.5a.5.5 0 0 1-.708 0l-.5-.5a.5.5 0 1 1 .708-.708L2 7.293l1.146-1.147a.5.5 0 0 1 .708 0m0 4a.5.5 0 0 1 0 .708l-1.5 1.5a.5.5 0 0 1-.708 0l-.5-.5a.5.5 0 0 1 .708-.708l.146.147 1.146-1.147a.5.5 0 0 1 .708 0" />
        </svg>

        <svg *ngIf="item.icon === 'clock-history'" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
          fill="currentColor" class="bi bi-clock-history" viewBox="0 0 16 16">
          <path d="M8.515 1.019A7 7 0 0 0 8 1V0a8 8 0 0 1 .589.022l-.074.997zm2.004.45a7 7 0 0 0-.985-.299l.219-.976c.383.086.76.2 1.126.342l-.36.933zm1.37.71a7 7 0 0 0-.439-.27l.493-.87a8 8 0 0 1 .979.654l-.615.789a7 7 0 0 0-.418-.302zm1.834 1.79A6.99 6.99 0 0 0 13.5 3.5v-1a7.99 7.99 0 0 1 1.714 1.55l-.75.66c-.22-.27-.466-.52-.734-.735zm1.512 2.3A7 7 0 0 0 14.5 5.5v-1a8 8 0 0 1 1.346.915l-.658.756zM15.938 8a7 7 0 0 0-.022-.589l.997.074A8 8 0 0 1 16 8h-1zm-.45 2.004a7 7 0 0 0 .299-.985l.976.219a8 8 0 0 1-.342 1.126l-.933-.36zm-.71 1.37a7 7 0 0 0 .27-.439l.87.493a8 8 0 0 1-.654.979l-.789-.615c.112-.131.21-.27.302-.418zm-1.79 1.834A6.99 6.99 0 0 0 12.5 13.5v1a7.99 7.99 0 0 1-1.55 1.714l-.66-.75c.27-.22.52-.466.735-.734zm-2.3 1.512A7 7 0 0 0 10.5 14.5v1a8 8 0 0 1-.915 1.346l-.756-.658zM8 15.938a7 7 0 0 0 .589-.022l-.074.997A8 8 0 0 1 8 16v-1zm-2.004-.45a7 7 0 0 0 .985.299l-.219.976a8 8 0 0 1-1.126-.342l.36.933zm-1.37-.71a7 7 0 0 0 .439.27l-.493.87a8 8 0 0 1-.979-.654l.615-.789c-.112.131-.21.27-.302.418zm-1.834-1.79A6.99 6.99 0 0 0 2.5 12.5v1a7.99 7.99 0 0 1-1.714-1.55l.75-.66c.22.27.466.52.734.735zm-1.512-2.3A7 7 0 0 0 1.5 10.5v1a8 8 0 0 1-1.346-.915l.658-.756zM.062 8a7 7 0 0 0 .022.589l-.997-.074A8 8 0 0 1 0 8h1zm.45-2.004a7 7 0 0 0-.299.985l-.976-.219A8 8 0 0 1 .342 4.874l.933.36zm.71-1.37a7 7 0 0 0-.27.439l-.87-.493a8 8 0 0 1 .654-.979l.789.615c-.112.131-.21.27-.302.418zm1.79-1.834A6.99 6.99 0 0 0 3.5 2.5v-1a7.99 7.99 0 0 1 1.55-1.714l.66.75c-.27.22-.52.466-.735.734zM5.5 1.512A7 7 0 0 0 5.5 1.5v-1a8 8 0 0 1 .915 1.346l.756-.658z" />
          <path d="M8 4.5a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1H8a.5.5 0 0 1-.5-.5v-4a.5.5 0 0 1 .5-.5z" />
        </svg>

        <svg *ngIf="item.icon === 'users'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
          class="bi bi-people-fill" viewBox="0 0 16 16">
          <path
            d="M7 14s-1 0-1-1 1-4 5-4 5 3 5 4-1 1-1 1zm4-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6m-5.784 6A2.24 2.24 0 0 1 5 13c0-1.355.68-2.75 1.936-3.72A6.3 6.3 0 0 0 5 9c-4 0-5 3-5 4s1 1 1 1zM4.5 8a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5" />
        </svg>

        <svg *ngIf="item.icon === 'file'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
          class="bi bi-file-earmark-text" viewBox="0 0 16 16">
          <path
            d="M5.5 7a.5.5 0 0 0 0 1h5a.5.5 0 0 0 0-1zM5 9.5a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5m0 2a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 0 1h-2a.5.5 0 0 1-.5-.5" />
          <path
            d="M9.5 0H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V4.5zm0 1v2A1.5 1.5 0 0 0 11 4.5h2V14a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1z" />
        </svg>

        <svg *ngIf="item.icon === 'chart'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
          class="bi bi-graph-up" viewBox="0 0 16 16">
          <path fill-rule="evenodd"
            d="M0 0h1v15h15v1H0zm14.817 3.113a.5.5 0 0 1 .07.704l-4.5 5.5a.5.5 0 0 1-.74.037L7.06 6.767l-3.656 5.027a.5.5 0 0 1-.808-.588l4-5.5a.5.5 0 0 1 .758-.06l2.609 2.61 4.15-5.073a.5.5 0 0 1 .704-.07" />
        </svg>

      </span>
      <span class="nav-label">{{ item.label }}</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <ng-container *ngFor="let item of bottomItems">
      <button *ngIf="item.action === 'logout'" type="button" class="nav-item" (click)="logout()" title="Cerrar sesión">
        <span class="icon">

          <svg *ngIf="item.icon === 'logout'" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
          fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
            <path fill-rule="evenodd"
            d="M10 12.5a.5.5 0 0 1 .5-.5h2.793l-1.147-1.146a.5.5 0 0 1 .708-.708l2 2a.5.5 0 0 1 0 .708l-2 2a.5.5 0 1 1-.708-.708L13.293 13H10.5a.5.5 0 0 1-.5-.5" />
            <path fill-rule="evenodd"
            d="M3.5 3A1.5 1.5 0 0 0 2 4.5v7A1.5 1.5 0 0 0 3.5 13h5a.5.5 0 0 1 0 1h-5A2.5 2.5 0 0 1 1 11.5v-7A2.5 2.5 0 0 1 3.5 2h5a.5.5 0 0 1 0 1z" />
          </svg>
        </span>
        <span class="nav-label">{{ item.label }}</span>
      </button>

      <a *ngIf="item.action !== 'logout'" class="nav-item" [routerLink]="item.route" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: false }" [title]="item.label">
        <span class="icon">
          <svg *ngIf="item.icon === 'settings'" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
            fill="currentColor" class="bi bi-gear-fill" viewBox="0 0 16 16">
            <path
            d="M9.405 1.05c-.413-1.4-2.397-1.4-2.81 0l-.1.34a1.464 1.464 0 0 1-2.105.872l-.31-.17c-1.283-.698-2.686.705-1.987 1.987l.169.311c.446.82.023 1.841-.872 2.105l-.34.1c-1.4.413-1.4 2.397 0 2.81l.34.1a1.464 1.464 0 0 1 .872 2.105l-.17.31c-.698 1.283.705 2.686 1.987 1.987l.311-.169a1.464 1.464 0 0 1 2.105.872l.1.34c.413 1.4 2.397 1.4 2.81 0l.1-.34a1.464 1.464 0 0 1 2.105-.872l.31.17c1.283.698 2.686-.705 1.987-1.987l-.169-.311a1.464 1.464 0 0 1 .872-2.105l.34-.1c1.4-.413 1.4-2.397 0-2.81l-.34-.1a1.464 1.464 0 0 1-.872-2.105l.17-.31c.698-1.283-.705-2.686-1.987-1.987l-.311.169a1.464 1.464 0 0 1-2.105-.872zM8 10.93a2.929 2.929 0 1 1 0-5.86 2.929 2.929 0 0 1 0 5.858z" />
          </svg>
        </span>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    </ng-container>
  </div>
</aside>
