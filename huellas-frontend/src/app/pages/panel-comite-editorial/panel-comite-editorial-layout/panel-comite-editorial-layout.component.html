<div class="layout-container" [class.collapsed]="collapsed">
  <aside class="sidebar">
    <div class="sidebar-header">
      <button class="menu-toggle" (click)="toggleSidebar()" title="Minimizar menú">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
          <path fill-rule="evenodd" d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5"/>
        </svg>
      </button>
      @if (!collapsed) {
        <span class="sidebar-brand">Revista Huellas</span>
      }
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/panel-comite-editorial/dashboard" routerLinkActive="active" class="nav-item" title="Dashboard">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-grid-1x2" viewBox="0 0 16 16">
          <path d="M6 1H1v6h5zm1 0h8v6H7zM6 8H1v7h5zm1 0h8v7H7z"/>
        </svg>
        <span class="nav-label">Dashboard</span>
      </a>
      <hr class="nav-divider" />
      <a routerLink="/panel-comite-editorial/articulos" routerLinkActive="active" class="nav-item" title="Artículos asignados">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-file-earmark-text" viewBox="0 0 16 16">
          <path d="M5.5 7a.5.5 0 0 0 0 1h5a.5.5 0 0 0 0-1zM5 9.5a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5m0 2a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 0 1h-2a.5.5 0 0 1-.5-.5"/>
          <path d="M14 4.5V14a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h5.5zm-3 0A1.5 1.5 0 0 1 9.5 3V1H4a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V5h-2a2 2 0 0 1-2-2"/>
        </svg>
        <span class="nav-label">Artículos asignados</span>
      </a>
      <a routerLink="/panel-comite-editorial/rubricas" routerLinkActive="active" class="nav-item" title="Rúbricas">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-ui-checks-grid" viewBox="0 0 16 16">
          <path d="M2 1.5A1.5 1.5 0 0 0 .5 3v1A1.5 1.5 0 0 0 2 5.5h12A1.5 1.5 0 0 0 15.5 4V3A1.5 1.5 0 0 0 14 1.5zM2 7.5A1.5 1.5 0 0 0 .5 9v1A1.5 1.5 0 0 0 2 11.5h12A1.5 1.5 0 0 0 15.5 10V9A1.5 1.5 0 0 0 14 7.5zm0 6A1.5 1.5 0 0 0 .5 15v1A1.5 1.5 0 0 0 2 17.5h12a1.5 1.5 0 0 0 1.5-1.5v-1A1.5 1.5 0 0 0 14 13.5z"/>
          <path d="M10.854 3.646a.5.5 0 0 0-.708 0L9 4.793 8.354 4.146a.5.5 0 1 0-.708.708L8.646 6a.5.5 0 0 0 .708 0l1.5-1.5a.5.5 0 0 0 0-.708m0 6a.5.5 0 0 0-.708 0L9 10.793l-.646-.647a.5.5 0 0 0-.708.708L8.646 12a.5.5 0 0 0 .708 0l1.5-1.5a.5.5 0 0 0 0-.708"/>
        </svg>
        <span class="nav-label">Rúbrica</span>
      </a>
      <a routerLink="/panel-comite-editorial/notificaciones" routerLinkActive="active" class="nav-item" title="Centro de Notificaciones">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-bell" viewBox="0 0 16 16">
          <path d="M8 16a2 2 0 0 0 2-2H6a2 2 0 0 0 2 2"/>
          <path d="M8 1.918l-.797.161A4 4 0 0 0 4 6c0 .628-.134 2.197-.459 3.742-.16.767-.376 1.566-.663 2.258h10.244c-.287-.692-.502-1.49-.663-2.258C12.134 8.197 12 6.628 12 6a4 4 0 0 0-3.203-3.92z"/>
          <path d="M14.22 12c.223.447.481.801.78 1H1c.299-.199.557-.553.78-1C2.68 10.2 3 6.88 3 6c0-2.42 1.72-4.44 4.005-4.901a1 1 0 1 1 1.99 0A5 5 0 0 1 13 6c0 .88.32 4.2 1.22 6"/>
        </svg>
        <span class="nav-label">Centro de Notificaciones</span>
        @if (!collapsed && totalNotificaciones > 0) {
          <span class="nav-badge">{{ totalNotificaciones }}</span>
        }
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="nav-item logout-btn" (click)="logout()" title="Cerrar sesión">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-box-arrow-right" viewBox="0 0 16 16">
          <path fill-rule="evenodd" d="M10 12.5a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v2a.5.5 0 0 0 1 0v-2A1.5 1.5 0 0 0 9.5 2h-8A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-2a.5.5 0 0 0-1 0v2z"/>
          <path fill-rule="evenodd" d="M15.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 0 0-.708.708L14.293 7.5H5.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708l3-3z"/>
        </svg>
        <span class="nav-label">Cerrar sesión</span>
      </button>
    </div>
  </aside>

  <div class="main-wrapper">
    @if (mostrarAlertaNotificaciones) {
      <section class="notification-alert" role="status" aria-live="polite">
        <div class="notification-alert__text">
          <strong>Nueva notificación</strong>
          <span>{{ mensajeAlertaNotificaciones }}</span>
        </div>
        <a routerLink="/panel-comite-editorial/notificaciones" class="notification-alert__link">Ver centro</a>
      </section>
    }
    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
