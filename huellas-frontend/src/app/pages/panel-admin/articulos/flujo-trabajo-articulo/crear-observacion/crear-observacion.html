<div class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="titulo-modal-observacion"
  (click)="cerrarModal()">
  <section class="modal-card" (click)="$event.stopPropagation()">
    <header class="modal-header">
      <h2 id="titulo-modal-observacion">Añadir Observación</h2>
      <button class="btn-icon-close" type="button" aria-label="Cerrar modal" (click)="cerrarModal()">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </header>

    <div class="modal-body">
      <div class="campo-formulario">
        <label for="asunto-input">Asunto</label>
        <input #asuntoInput id="asunto-input" type="text" placeholder="Introduce el asunto de la observación..." />
      </div>

      <div class="campo-formulario">
        <label for="comentarios-input">Comentarios</label>
        <textarea #comentariosInput id="comentarios-input" rows="4"
          placeholder="Escribe tus comentarios y observaciones aquí..."></textarea>
      </div>

      <div class="campo-formulario">
        <label>Subir archivos</label>

        <div class="dropzone" [class.is-drag-over]="enDragOver" (dragover)="onDragOver($event)"
          (dragleave)="onDragLeave($event)" (drop)="onDrop($event)">
          <button class="dropzone-content" type="button" (click)="abrirSelectorArchivos()">
            <svg class="icon-cloud" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 17V8" />
              <polyline points="8 12 12 8 16 12" />
              <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3" />
              <path d="M16 16.25A5 5 0 0 0 20 17" />
            </svg>
            <p>Arrastra tus archivos aquí o haz clic para seleccionar (múltiples archivos permitidos)</p>
          </button>

          <input #fileInput type="file" multiple hidden (change)="onFileInputChange($event)" accept=".pdf,.docx" />

          <div *ngIf="archivosSeleccionados.length" class="archivos-lista">
            <article *ngFor="let archivo of archivosSeleccionados" class="archivo-chip">
              <span class="archivo-texto" [title]="archivo.nombre">
                {{ archivo.nombre }} ({{ formatearTamano(archivo.tamano) }})
              </span>
              <button class="btn-eliminar-archivo" type="button" aria-label="Quitar archivo"
                (click)="eliminarArchivo(archivo.id)">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"
                  stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="3 6 5 6 21 6"></polyline>
                  <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                  <line x1="10" y1="11" x2="10" y2="17"></line>
                  <line x1="14" y1="11" x2="14" y2="17"></line>
                </svg>
              </button>
            </article>

            <button class="btn-anadir-archivos" type="button" (click)="abrirSelectorArchivos()">
              Añadir más archivos...
            </button>
          </div>
        </div>

        <p *ngIf="mensajeError" class="mensaje-error">{{ mensajeError }}</p>
      </div>
    </div>

    <footer class="modal-footer">
      <button class="btn-secundario" type="button" (click)="cerrarModal()">Cancelar</button>
      <button class="btn-primario" type="button" (click)="solicitarConfirmacionEnvio()" [disabled]="enviando">
        {{ enviando ? 'Enviando...' : 'Enviar' }}
      </button>
    </footer>
  </section>

  @if (mostrarModalConfirmacion) {
  <section class="confirmacion-overlay" (click)="cancelarConfirmacionEnvio()">
    <article class="confirmacion-card" (click)="$event.stopPropagation()">
      <h3>Confirmar envío</h3>
      <p>¿Seguro que deseas enviar esta observación?</p>
      <div class="confirmacion-actions">
        <button class="btn-secundario" type="button" (click)="cancelarConfirmacionEnvio()">Cancelar</button>
        <button class="btn-primario" type="button" (click)="confirmarYEnviarObservacion()" [disabled]="enviando">
          Confirmar envío
        </button>
      </div>
    </article>
  </section>
  }

</div>
