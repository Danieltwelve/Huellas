<div class="modal-backdrop" *ngIf="isVisible" (click)="closeModal()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>Eliminar Requisito</h3>
      <button class="close-btn" (click)="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <p>¿Estás seguro de que deseas eliminar este requisito?</p>
      <div class="requisito-texto" *ngIf="requisitoTexto">
        "{{ requisitoTexto }}"
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancelar" (click)="closeModal()">Cancelar</button>
      <button class="btn-confirmar" (click)="confirmar()">Eliminar</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" *ngIf="isSuccessVisible" (click)="closeSuccessModal()">
  <div class="modal-container success-modal" (click)="$event.stopPropagation()">
    <div class="modal-body success-body">
      <div class="success-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="#10b981" class="bi bi-check-circle-fill" viewBox="0 0 16 16">
          <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
        </svg>
      </div>
      <h3>¡Eliminado con éxito!</h3>
      <p>El requisito ha sido eliminado correctamente del sistema.</p>
      <button class="btn-success" (click)="closeSuccessModal()">Aceptar</button>
    </div>
  </div>
</div>
