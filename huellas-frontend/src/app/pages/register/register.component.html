<div class="register">
  <form class="register-card" [formGroup]="registerForm" (ngSubmit)="signUp()">
    <h2>Registro</h2>

    <div class="form-group">
      <label for="nombre">Nombres</label>
      <input id="nombre" type="text" placeholder="Ingresa tus nombres" formControlName="nombre" />
    </div>

    <div class="form-group">
      <label for="apellido">Apellidos</label>
      <input id="apellido" type="text" placeholder="Ingresa tus apellidos" formControlName="apellido" />
    </div>

    <div class="form-group">
      <label for="correo">Correo</label>
      <input id="correo" type="email" placeholder="tucorreo@ejemplo.com" formControlName="correo" />
    </div>

    <div class="form-group">
      <label for="contraseña">Contraseña</label>
      <input id="contraseña" type="password" placeholder="Crea una contraseña" formControlName="contraseña" />
    </div>

    <div class="form-group">
      <label for="confirmarContraseña">Confirmar contraseña</label>
      <input id="confirmarContraseña" type="password" placeholder="Repite tu contraseña"
        formControlName="confirmarContraseña" />
    </div>

    <button class="register-btn" type="submit" [disabled]="registerForm.invalid">Registrarse</button>

    <p class="register-footer">
      ¿Ya tienes una cuenta?
      <a [routerLink]="['/login']">Iniciar Sesión</a>
    </p>
  </form>
</div>
