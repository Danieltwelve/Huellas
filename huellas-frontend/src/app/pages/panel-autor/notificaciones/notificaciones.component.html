<section class="notify-page">
  <header class="notify-header">
    <div>
      <p class="kicker">Centro de notificaciones</p>
      <h1>Alertas del flujo editorial</h1>
    </div>
    <button type="button" class="ghost" (click)="marcarTodasLeidas()">Marcar todo como leido</button>
  </header>

  <div class="notify-filters">
    <button type="button" [class.active]="filtro === 'todas'" (click)="setFiltro('todas')">Todas</button>
    <button type="button" [class.active]="filtro === 'no-leidas'" (click)="setFiltro('no-leidas')">No leidas</button>
  </div>

  <div class="notify-list">
    @for (item of visibles; track item.titulo + item.fecha) {
      <article class="notify-item" [class.unread]="!item.leida">
        <span class="type" [class.type-action]="item.tipo === 'accion'" [class.type-info]="item.tipo === 'informacion'" [class.type-success]="item.tipo === 'exito'"></span>
        <div>
          <h3>{{ item.titulo }}</h3>
          <p>{{ item.detalle }}</p>
        </div>
        <span class="date">{{ item.fecha }}</span>
      </article>
    }

    @if (visibles.length === 0) {
      <article class="notify-empty">
        No hay notificaciones pendientes para este filtro.
      </article>
    }
  </div>
</section>
