<div class="auth-wrapper">
  <!-- Left Panel - Image -->
  <div class="auth-image-panel">
    <div class="image-overlay"></div>
    <img src="/equipo/portada.jpg" alt="HUELLAS" class="background-image" />

    <div class="toggle-container">
      <button class="toggle-btn">
        Inicio Sesión
      </button>
      <button class="toggle-btn">
        <a [routerLink]="['/register']">Registrarse</a>
      </button>
      <button class="toggle-btn" (click)="logout()">
        Cerrar Sesión
      </button>
    </div>
  </div>

  <!-- Right Panel - Form -->
  <div class="auth-form-panel">
    <div class="form-container">
      <!-- Logo -->
      <div class="logo-container">
        <img src="/equipo/Huellaslogo.png" alt="HUELLAS Logo" class="logo" />
      </div>

      <!-- Login Form -->
      <form class="auth-form" (ngSubmit)="loginWithEmailAndPassword()">
        <div class="input-group">
          <span class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
          </span>
          <input
            type="email"
            placeholder="Correo electrónico"
            class="auth-input"
            name="correo"
            [(ngModel)]="correo"
            required
          />
        </div>

        <div class="input-group">
          <span class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
          </span>
          <input
            type="password"
            placeholder="Contraseña"
            class="auth-input"
            name="contraseña"
            [(ngModel)]="contrasena"
            required
          />
        </div>

        <div class="form-footer">
          <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
          <button type="submit" class="login-btn">Iniciar sesión</button>
        </div>

        <div class="social-login">
          <p class="social-text">o inicia sesión con</p>
          <div class="social-buttons">
            <button type="button" class="social-btn google" (click)="onGoogleLogin()">
              <svg width="20" height="20" viewBox="0 0 24 24">
                <path fill="#4285F4"
                  d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                <path fill="#34A853"
                  d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                <path fill="#FBBC05"
                  d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                <path fill="#EA4335"
                  d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
              </svg>
              Google
            </button>
            <button type="button" class="social-btn microsoft">
              <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
                <rect x="1" y="1" width="10" height="10" fill="#F25022" />
                <rect x="13" y="1" width="10" height="10" fill="#7FBA00" />
                <rect x="1" y="13" width="10" height="10" fill="#00A4EF" />
                <rect x="13" y="13" width="10" height="10" fill="#FFB900" />
              </svg>
              Microsoft
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
