<div class="auth-wrapper">
  <!-- Left Panel - Image -->
  <div class="auth-image-panel">
    <div class="image-overlay"></div>
    <img src="/equipo/portada.jpg" alt="HUELLAS" class="background-image" />

    <div class="toggle-container">
      <button class="toggle-btn">
        Inicio Sesión
      </button>
      <button class="toggle-btn">
        <a [routerLink]="['/register']">Registrarse</a>
      </button>
      <button class="toggle-btn" (click)="logout()">
        Cerrar Sesión
      </button>
    </div>
  </div>

  <!-- Right Panel - Form -->
  <div class="auth-form-panel">
    <div class="form-container">
      <!-- Logo -->
      <div class="logo-container">
        <img src="/equipo/Huellaslogo.png" alt="HUELLAS Logo" class="logo" />
      </div>

      <!-- Login Form -->
      <form class="auth-form" (ngSubmit)="loginWithEmailAndPassword()">
        <div class="input-group">
          <span class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
          </span>
          <input type="email" placeholder="Correo electrónico" class="auth-input" name="correo" [(ngModel)]="correo"
            required />
        </div>

        <div class="input-group">
          <span class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
          </span>
          <input type="password" placeholder="Contraseña" class="auth-input" name="contraseña" [(ngModel)]="contrasena"
            required />
        </div>

        <div class="form-footer">
          <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
          <button type="submit" class="login-btn">Iniciar sesión</button>
        </div>

        <div class="social-login">
          <p class="social-text">Or Login With</p>
          <div class="social-buttons">
            <button type="button" class="social-btn google" (click)="onGoogleLogin()">
              <svg width="20" height="20" viewBox="0 0 24 24">
                <path fill="#4285F4"
                  d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                <path fill="#34A853"
                  d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                <path fill="#FBBC05"
                  d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                <path fill="#EA4335"
                  d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
              </svg>
              Google
            </button>
            <button type="button" class="social-btn facebook">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2">
                <path
                  d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
              </svg>
              Facebook
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
  @if (showVerificationModal) {
  <div class="verification-modal-backdrop">
    <div class="verification-modal" role="dialog" aria-modal="true" aria-labelledby="verification-title">

      <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" fill="#FFBB00" class="bi bi-exclamation-circle"
        viewBox="0 0 16 16">
        <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16" />
        <path
          d="M7.002 11a1 1 0 1 1 2 0 1 1 0 0 1-2 0M7.1 4.995a.905.905 0 1 1 1.8 0l-.35 3.507a.552.552 0 0 1-1.1 0z" />
      </svg>

      <p id="verification-title">
        Debes verificar tu correo electrónico antes de iniciar sesión.
        Revisa tu bandeja de entrada.
      </p>

      <button type="button" class="continue-btn" (click)="closeVerificationModal()">
        Entendido
      </button>
    </div>
  </div>
  }

  @if (showWrongModal) {
  <div class="verification-modal-backdrop">
    <div class="verification-modal" role="dialog" aria-modal="true" aria-labelledby="verification-title">

      <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" fill="#E74C3C" class="bi bi-emoji-frown"
        viewBox="0 0 16 16">
        <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16" />
        <path
          d="M4.285 12.433a.5.5 0 0 0 .683-.183A3.5 3.5 0 0 1 8 10.5c1.295 0 2.426.703 3.032 1.75a.5.5 0 0 0 .866-.5A4.5 4.5 0 0 0 8 9.5a4.5 4.5 0 0 0-3.898 2.25.5.5 0 0 0 .183.683M7 6.5C7 7.328 6.552 8 6 8s-1-.672-1-1.5S5.448 5 6 5s1 .672 1 1.5m4 0c0 .828-.448 1.5-1 1.5s-1-.672-1-1.5S9.448 5 10 5s1 .672 1 1.5" />
      </svg>

      <p id="verification-title">
        Hubo un problema al iniciar sesión con correo y contraseña.
      </p>

      <button type="button" class="wrong-btn" (click)="closeWrongModal()">
        Cerrar
      </button>
    </div>
  </div>
  }
</div>
